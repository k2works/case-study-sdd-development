services:
  postgres:
    image: postgres:16-alpine
    container_name: frere-memoire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: frere_memoire
      POSTGRES_PASSWORD: password
      POSTGRES_DB: frere_memoire_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frere_memoire"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
