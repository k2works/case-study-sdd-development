name: Frontend Quality

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm exec --workspace @fleur-memoire/frontend playwright install --with-deps chromium

      - name: Run frontend lint
        run: npm run lint --workspace @fleur-memoire/frontend

      - name: Run frontend unit tests
        run: npm run test:frontend

      - name: Run frontend typecheck
        run: npm run typecheck:frontend

      - name: Run frontend smoke E2E
        run: npm run test:e2e:frontend
