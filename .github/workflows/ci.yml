name: CI

on:
  push:
    paths:
      - 'apps/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/**'

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fleur_memoire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Lint
        working-directory: apps/backend
        run: npm run lint

      - name: Type check
        working-directory: apps/backend
        run: npm run type-check

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fleur_memoire_test
        run: npx prisma migrate deploy

      - name: Test
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fleur_memoire_test
          NODE_ENV: test
        run: npm test

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Type check
        working-directory: apps/frontend
        run: npm run type-check

      - name: Test
        working-directory: apps/frontend
        run: npm test
