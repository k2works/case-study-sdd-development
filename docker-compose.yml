services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_MAJOR: 24
    volumes:
      - .:/srv
    tty: true
    stdin_open: true

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fleur_memoire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fleur_memoire"]
      interval: 10s
      timeout: 5s
      retries: 5

  mkdocs:
    build:
      context: .
      dockerfile: ./ops/docker/mkdoc/Dockerfile
    environment:
        PLANTUML_SERVER_URL: http://plantuml:8080/plantuml
    volumes:
      - ./docs:/docs/docs
      - ./README.md:/docs/README.md
      - ./mkdocs.yml:/docs/mkdocs.yml
      - ./site:/docs/site
    ports:
      - "8000:8000"
    command: mkdocs serve --dev-addr=0.0.0.0:8000 --livereload
    links:
      - plantuml

  plantuml:
    image: plantuml/plantuml-server:jetty
    environment:
      BASE_URL: plantuml

volumes:
  postgres-data:
