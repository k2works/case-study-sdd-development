spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/webshop
    driver-class-name: org.postgresql.Driver
    username: webshop
    password: webshop
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
