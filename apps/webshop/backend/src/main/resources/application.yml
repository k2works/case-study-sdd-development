server:
  port: 8080

spring:
  application:
    name: webshop
  datasource:
    url: jdbc:h2:mem:webshop
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /api
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
