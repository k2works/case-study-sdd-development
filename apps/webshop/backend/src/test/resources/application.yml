spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /api
  endpoint:
    health:
      show-details: never

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000

cors:
  allowed-origins: http://localhost:5173
