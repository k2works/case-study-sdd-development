[tox]
envlist = test,lint,type
skipsdist = true

[testenv:test]
deps =
    pytest
    pytest-django
    pytest-cov
    factory-boy
commands =
    pytest --cov=apps --cov-report=term-missing --verbose

[testenv:lint]
deps = ruff
commands =
    ruff check .
    ruff format --check .

[testenv:format]
deps = ruff
commands =
    ruff format .

[testenv:type]
deps =
    mypy
    django-stubs
    djangorestframework-stubs
commands =
    mypy apps --ignore-missing-imports

[testenv:security]
deps =
    bandit
    pip-audit
commands =
    bandit -r apps -q
    pip-audit
