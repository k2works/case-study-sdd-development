{% extends "shop/base.html" %}

{% block title %}発注登録 - フレール・メモワール{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">発注登録</h1>

<form method="post" class="bg-white rounded-lg shadow p-6 max-w-lg">
  {% csrf_token %}

  <div class="mb-4">
    <label for="item_id" class="block text-sm font-medium text-gray-700 mb-1">単品</label>
    <select id="item_id" name="item_id" required
            class="w-full border rounded px-3 py-2 text-sm"
            onchange="updateSupplier(this)">
      <option value="">-- 選択してください --</option>
      {% for item in items %}
      <option value="{{ item.pk }}"
              data-supplier="{{ item.supplier.name }}"
              data-unit="{{ item.purchase_unit }}"
              {% if selected_item and selected_item.pk == item.pk %}selected{% endif %}>
        {{ item.name }}（購入単位: {{ item.purchase_unit }}本、リードタイム: {{ item.lead_time_days }}日）
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">仕入先（自動設定）</label>
    <p id="supplier_display" class="border rounded px-3 py-2 text-sm bg-gray-50 text-gray-600">
      {% if selected_item %}{{ selected_item.supplier.name }}{% else %}単品を選択すると自動設定されます{% endif %}
    </p>
  </div>

  <div class="mb-4">
    <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">数量</label>
    <input type="number" id="quantity" name="quantity" min="1" required
           class="w-full border rounded px-3 py-2 text-sm"
           {% if selected_item %}value="{{ selected_item.purchase_unit }}"{% endif %}>
  </div>

  <div class="mb-6">
    <label for="expected_arrival_date" class="block text-sm font-medium text-gray-700 mb-1">入荷予定日</label>
    <input type="date" id="expected_arrival_date" name="expected_arrival_date" required
           class="w-full border rounded px-3 py-2 text-sm">
  </div>

  <div class="flex gap-3">
    <button type="submit" class="bg-pink-600 text-white px-6 py-2 rounded hover:bg-pink-700 transition text-sm">発注する</button>
    <a href="{% url 'purchasing:order_list' %}" class="text-gray-500 hover:text-gray-700 px-4 py-2 text-sm">キャンセル</a>
  </div>
</form>

<script>
function updateSupplier(select) {
  var option = select.options[select.selectedIndex];
  var display = document.getElementById('supplier_display');
  display.textContent = option.dataset.supplier || '単品を選択すると自動設定されます';
}
</script>
{% endblock %}
