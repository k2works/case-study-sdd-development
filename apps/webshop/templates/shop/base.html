<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}フレール・メモワール{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <a href="{% url 'shop:product_list' %}" class="text-2xl font-bold text-pink-600">
        Fleur Mémoire
      </a>
      <p class="text-sm text-gray-500">フレール・メモワール — 花束のオンラインショップ</p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t mt-16">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
      &copy; Fleur Mémoire
    </div>
  </footer>
</body>
</html>
