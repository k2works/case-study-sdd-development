<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}フレール・メモワール{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div>
          <a href="{% url 'shop:product_list' %}" class="text-2xl font-bold text-pink-600">
            Fleur Mémoire
          </a>
          <p class="text-sm text-gray-500">フレール・メモワール — 花束のオンラインショップ</p>
        </div>
        <nav class="flex gap-4 text-sm">
          <a href="{% url 'shop:product_list' %}" class="text-gray-600 hover:text-pink-600 transition">商品一覧</a>
          <a href="{% url 'shop:order_history' %}" class="text-gray-600 hover:text-pink-600 transition">注文履歴</a>
          <a href="{% url 'shop:order_cancel' %}" class="text-gray-600 hover:text-pink-600 transition">注文キャンセル</a>
          <span class="border-l border-gray-300"></span>
          <a href="{% url 'staff_orders:order_list' %}" class="text-gray-600 hover:text-indigo-600 transition">受注管理</a>
          <a href="{% url 'purchasing:order_list' %}" class="text-gray-600 hover:text-indigo-600 transition">発注管理</a>
          <a href="{% url 'purchasing:expiry_alert' %}" class="text-gray-600 hover:text-indigo-600 transition">品質アラート</a>
          <a href="{% url 'shipping:bundling_list' %}" class="text-gray-600 hover:text-indigo-600 transition">結束一覧</a>
          <a href="{% url 'shipping:shipment_list' %}" class="text-gray-600 hover:text-indigo-600 transition">出荷管理</a>
          <a href="{% url 'inventory:stock_forecast' %}" class="text-gray-600 hover:text-indigo-600 transition">在庫推移</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t mt-16">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
      &copy; Fleur Mémoire
    </div>
  </footer>
</body>
</html>
