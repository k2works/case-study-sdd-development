site_name: 花束問題のケーススタディ
site_description: 仕様駆動開発（SDD）のケーススタディ
site_author: Project Team
repo_url: https://github.com/k2works/case-study-sdd-development
repo_name: case-study-sdd-development

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

extra_css:
  - docs/mkdocs/assets/css/extra.css

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: plantuml
          class: plantuml
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.tasklist
  - pymdownx.emoji
  - admonition
  - toc:
      permalink: true
  - plantuml_markdown:
      server: !!python/object/apply:os.getenv
        - PLANTUML_SERVER_URL
        - http://www.plantuml.com/plantuml
      format: svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js
  - docs/assets/js/extra.js

extra:
  plantuml_url: http://www.plantuml.com/plantuml
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/k2works/case-study-sdd-development
      name: GitHub Repository/case-study-sdd-development

plugins:
  - search

exclude_docs: |
  wiki

nav:
  - Home: index.md
  - 分析:
      - 概要: analysis/index.md
      - ビジネスアーキテクチャ: analysis/business_architecture.md
      - インセプションデッキ: analysis/inception_deck.md
  - 要件:
      - 概要: requirements/index.md
      - 要件定義書: requirements/requirements_definition.md
      - ビジネスユースケース: requirements/business_usecase.md
      - システムユースケース: requirements/system_usecase.md
      - ユーザーストーリー: requirements/user_story.md
  - 設計:
      - 概要: design/index.md
      - バックエンドアーキテクチャ: design/architecture_backend.md
      - フロントエンドアーキテクチャ: design/architecture_frontend.md
      - インフラストラクチャ: design/architecture_infrastructure.md
      - データモデル設計: design/data-model.md
      - ドメインモデル設計: design/domain-model.md
      - UI 設計: design/ui-design.md
      - テスト戦略: design/test_strategy.md
      - 非機能要件: design/non_functional.md
      - 運用要件: design/operation.md
      - 技術スタック選定: design/tech_stack.md
  - 開発:
      - 概要: development/index.md
      - リリース計画: development/release_plan.md
      - イテレーション 1 計画: development/iteration_plan-1.md
  - 運用:
      - 概要: operation/index.md
      - Ralph Wiggum 運用ガイド: operation/ralph.md
  - リファレンス:
